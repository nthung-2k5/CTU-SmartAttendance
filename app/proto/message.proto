syntax = "proto3";

// Published by server to classroom/{room_uuid}/start-session
// Signals the start of a new attendance session
message SessionStart {
  int64 session_start = 1;
}

// Published by server to classroom/{room_uuid}/end-session
// Signals the end of an attendance session
message SessionEnd {}

// Published by server to classroom/{room_uuid}/attendance
// Confirms a student has successfully checked in
message AttendanceSuccess {
  string student_id = 1;
  string student_name = 2;
  int64 timestamp = 3;
}
